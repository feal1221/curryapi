# 雲端部署專用設定
spring.cloud.gcp.sql.enabled=true
spring.cloud.gcp.enabled=true
spring.cloud.gcp.sql.instance-connection-name=curry-491814:asia-east1:user
spring.cloud.gcp.sql.database-name=curry
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.url=jdbc:mysql:///curry?cloudSqlInstance=curry-491814:asia-east1:user&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.internal.secret=${INTERNAL_SECRET}
app.scheduling.enable=false
#??
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fealnoworking@gmail.com
spring.mail.password=xoytskamysqfjeky
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# 匯出報表收件人 (由環境變數 EXPORT_RECIPIENT 提供值，啟動時必須設定)
app.export.recipient=${EXPORT_RECIPIENT}
# 關閉 DDL 自動更新（雲端環境建議手動管理或設為 none/validate）
spring.jpa.hibernate.ddl-auto=none
# 指定資料庫方言 (Dialect) 防止自動偵測失敗
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000